<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogniLens Upload</title>
  <link rel="stylesheet" href="./styles.css?v=ai-chat-1">
</head>
<body class="upload-body">
  <header class="app-nav">
    <div class="app-nav-inner">
      <a class="app-brand" href="./index.html">
        <span class="app-brand-mark">C</span>
        <span class="app-brand-name">CogniLens</span>
      </a>

      <nav class="app-nav-links" aria-label="Primary">
        <a href="./history.html">History</a>
        <a href="./docs.html">Docs</a>
        <a class="nav-cta active" href="./index.html">New Analysis</a>
      </nav>
    </div>
  </header>

  <main class="upload-page">
    <section class="upload-hero">
      <div class="upload-copy">
        <p class="upload-kicker">CogniLens</p>
        <h1>Evaluate Cognitive Accessibility</h1>
        <p class="upload-description">
          Upload an HTML file or ZIP package to inspect readability, visual complexity,
          distraction, and structural consistency before opening the dashboard.
        </p>
      </div>

      <form id="uploadForm" class="upload-form" novalidate>
        <label id="dropzone" class="dropzone" for="uploadInput">
          <input id="uploadInput" type="file" accept=".html,.htm,text/html,.zip,application/zip">
          <span class="dropzone-label">Drag &amp; drop your HTML or ZIP file here</span>
          <span id="selectedFileName" class="dropzone-file">or choose an HTML / ZIP file</span>
        </label>

        <button id="analyzeButton" class="upload-analyze-button" type="submit" disabled>
          Analyze
        </button>
      </form>

      <p id="uploadStatus" class="upload-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="./upload.js?v=ai-chat-1"></script>
</body>
</html>
