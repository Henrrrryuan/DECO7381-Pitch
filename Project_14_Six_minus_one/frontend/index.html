<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogniLens Upload</title>
  <link rel="stylesheet" href="./styles.css?v=loading-page-1">
</head>
<body class="upload-body">
  <header class="app-nav">
    <div class="app-nav-inner">
      <a class="app-brand" href="./index.html">
        <span class="app-brand-mark">C</span>
        <span class="app-brand-name">CogniLens</span>
      </a>

      <nav class="app-nav-links" aria-label="Primary">
            <a href="http://127.0.0.1:8001/eye/">Eye Tracking</a>
        <a href="./history.html">History</a>
        <a href="./docs.html">Docs</a>
        <a class="nav-cta active" href="./index.html">New Analysis</a>
      </nav>
    </div>
  </header>

  <main class="upload-page">
    <section class="upload-hero">
      <div class="upload-copy">
        <h1>Cognitive Accessibility Evaluation</h1>
      </div>

      <section class="input-workflow" aria-label="CogniLens input workflow">
        <div class="workflow-card">
          <aside class="upload-character-panel" aria-hidden="true">
            <div class="character-stage">
              <div class="character figure-purple">
                <div class="character-eyes">
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                </div>
              </div>
              <div class="character figure-dark">
                <div class="character-eyes">
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                </div>
              </div>
              <div class="character figure-orange">
                <div class="character-eyes">
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                </div>
              </div>
              <div class="character figure-yellow">
                <div class="character-eyes">
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                  <span class="eye-ball"><span class="eye-pupil" data-eye-pupil></span></span>
                </div>
                <span class="character-mouth" aria-hidden="true"></span>
              </div>
            </div>
          </aside>

          <div class="workflow-options" role="tablist" aria-label="Input method">
            <button
              class="workflow-option is-active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="urlForm"
              data-workflow-option="url"
            >
              <span class="workflow-option-title">Website URL</span>
              <span class="workflow-option-copy">Check a page from your local development server only.</span>
            </button>
            <button
              class="workflow-option"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="uploadForm"
              data-workflow-option="file"
            >
              <span class="workflow-option-title">Upload File</span>
              <span class="workflow-option-copy">Check an HTML file or ZIP package from your computer.</span>
            </button>
          </div>

          <div class="workflow-panels">
            <form id="urlForm" class="workflow-panel primary-input-card is-active" role="tabpanel" data-workflow-panel="url" novalidate>
              <div class="input-card-copy">
                <h3>Check a website</h3>
                <p>
                  Paste a local development URL (localhost / local network).
                </p>
              </div>

              <div class="url-input-row">
                <input
                  id="urlInput"
                  class="url-input"
                  type="url"
                  inputmode="url"
                  placeholder="http://localhost:5173"
                  autocomplete="url"
                >
              </div>

              <button id="analyzeUrlButton" class="upload-analyze-button" type="submit" disabled>
                Analyze
              </button>
            </form>

            <form id="uploadForm" class="workflow-panel upload-form secondary-upload-card" role="tabpanel" data-workflow-panel="file" hidden novalidate>
              <div class="input-card-copy">
                <h3>Check a file</h3>
                <p>
                  Upload an HTML file or a ZIP package when you do not have a live page.
                </p>
              </div>

              <label id="dropzone" class="dropzone" for="uploadInput">
                <input id="uploadInput" type="file" accept=".html,.htm,text/html,.zip,application/zip">
                <span class="dropzone-label">Drag &amp; drop an HTML or ZIP file</span>
                <span id="selectedFileName" class="dropzone-file">or choose an HTML / ZIP file</span>
              </label>

              <button id="analyzeButton" class="upload-analyze-button secondary-action" type="submit" disabled>
                Analyze
              </button>
            </form>
          </div>
        </div>

      </section>

      <p id="uploadStatus" class="upload-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="./upload.js?v=loading-page-1"></script>
</body>
</html>
