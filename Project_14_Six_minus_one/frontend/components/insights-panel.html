<section class="panel right-panel">
  <section class="right-top">
    <div>
      <p class="kicker small">Inspection Workspace</p>
      <h2>Explanation</h2>
    </div>
    <button id="openPreviewBtn" class="link-button" type="button">Click to view the website</button>
  </section>

  <section class="right-content">
    <article class="insight-card explanation-card">
      <div class="field">
        <label for="htmlInput">HTML Input</label>
        <textarea id="htmlInput" spellcheck="false"></textarea>
      </div>
      <div id="explanationContent" class="rich-text empty">
        Analysis explanations will appear here after the current page is processed.
      </div>
    </article>

    <article class="insight-card suggestion-card">
      <div class="section-header">
        <h2>Suggestion</h2>
        <span class="placeholder-tag">AI-ready</span>
      </div>
      <div id="suggestionContent" class="suggestion-feed">
        <article class="suggestion-bubble system">
          <p>This area shows rule-based suggestions for the current analysis.</p>
          <p>It can later be extended with an AI API for richer rewrite advice.</p>
        </article>
      </div>

      <form id="suggestionForm" class="suggestion-form">
        <input id="suggestionInput" type="text" placeholder="Reserved for a future AI suggestion input..." disabled>
        <button id="suggestionSendBtn" type="submit" disabled>Send</button>
      </form>
    </article>
  </section>
</section>
