<aside class="panel left-panel">
  <div class="left-scroll">
    <section class="left-section dashboard-section">
      <div class="section-header">
        <h2>Dashboard</h2>
        <button id="reuploadBtn" class="ghost-btn" type="button">Re-upload</button>
      </div>

      <div class="dashboard-summary">
        <div class="score-ring" id="scoreRing">
          <div class="score-ring-inner">
            <span class="score-ring-value" id="leftOverallScore">-</span>
            <span class="score-ring-label">Overall</span>
          </div>
        </div>

        <div class="summary-caption">
          <p id="dashboardStatus">等待分析</p>
          <p id="dashboardSummaryText">上传 HTML 后将在这里显示总体状态。</p>
        </div>
      </div>

      <div id="dimensionBars" class="dimension-bars">
        <div class="dimension-row">
          <span>Visual Complexity</span>
          <div class="bar-track"><div class="bar-fill visual" style="width:0%"></div></div>
          <strong>-</strong>
        </div>
        <div class="dimension-row">
          <span>Readability</span>
          <div class="bar-track"><div class="bar-fill readability" style="width:0%"></div></div>
          <strong>-</strong>
        </div>
        <div class="dimension-row">
          <span>Interaction & Distraction</span>
          <div class="bar-track"><div class="bar-fill interaction" style="width:0%"></div></div>
          <strong>-</strong>
        </div>
        <div class="dimension-row">
          <span>Consistency</span>
          <div class="bar-track"><div class="bar-fill consistency" style="width:0%"></div></div>
          <strong>-</strong>
        </div>
      </div>
    </section>

    <section class="left-section">
      <div class="section-header">
        <h2>Overall Comments</h2>
      </div>
      <div id="overallComments" class="text-panel">
        系统会根据四个维度分数，在这里生成整体评价。
      </div>
    </section>

    <section class="left-section">
      <div class="section-header">
        <h2>Comparison</h2>
      </div>
      <div id="comparisonPanel" class="comparison-panel empty">
        还没有前后对比数据。再次分析新的 HTML 后，这里会显示差异。
      </div>
    </section>
  </div>
</aside>
