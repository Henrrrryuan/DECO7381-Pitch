<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogniLens Docs</title>
  <link rel="stylesheet" href="./styles.css?v=ai-chat-1">
</head>
<body class="docs-body">
  <header class="app-nav">
    <div class="app-nav-inner">
      <a class="app-brand" href="./index.html">
        <span class="app-brand-mark">C</span>
        <span class="app-brand-name">CogniLens</span>
      </a>

      <nav class="app-nav-links" aria-label="Primary">
            <a href="http://127.0.0.1:8001/eye/">Eye Tracking</a>
        <a href="./history.html">History</a>
        <a class="active-link" href="./docs.html">Docs</a>
        <button id="backToAnalysisButton" class="nav-cta" type="button" hidden>Back to analysis</button>
        <a class="nav-cta" href="./index.html">New Analysis</a>
      </nav>
    </div>
  </header>

  <main class="docs-page">
    <section class="docs-panel">
      <p class="upload-kicker">Docs</p>
      <h1>How to use CogniLens</h1>
      <div class="docs-copy">
        <p>1. Click <strong>New Analysis</strong> to upload an HTML file.</p>
        <p>2. Wait for the analysis to finish and open the dashboard.</p>
        <p>3. Review explanation, suggestion, and comparison results.</p>
        <p>4. Use <strong>History</strong> to reopen previous submissions.</p>
      </div>
    </section>
  </main>
  <script>
    (() => {
      const backButton = document.getElementById("backToAnalysisButton");
      const storageKey = "cognilens.return.analysis-url";
      if (!backButton) {
        return;
      }
      let returnUrl = "";
      try {
        returnUrl = sessionStorage.getItem(storageKey) || "";
      } catch (_) {
        returnUrl = "";
      }
      if (!returnUrl) {
        return;
      }
      backButton.hidden = false;
      backButton.addEventListener("click", () => {
        window.location.href = returnUrl;
      });
    })();
  </script>
</body>
</html>
