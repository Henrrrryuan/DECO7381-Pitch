<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistency Missing Progress Sample</title>
    <style>
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            line-height: 1.6;
            color: #333;
            padding: 20px;
            background: #f5f5f5;
        }

        .test-wrapper {
            max-width: 960px;
            margin: auto;
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .step-card {
            margin-top: 16px;
            padding: 18px;
            border: 1px solid #d7e3f4;
            border-radius: 10px;
            background: #f7fbff;
        }
    </style>
</head>
<body>
    <div class="test-wrapper">
        <nav>
            <a href="/">Home</a>
            <a href="/account">Account</a>
            <a href="/checkout">Checkout</a>
        </nav>

        <main>
            <h1>Checkout</h1>
            <h2>Complete Your Order</h2>
            <p>This sample is designed to trigger CS-2 without triggering CS-1.</p>

            <section class="step-card wizard-panel">Customer Information</section>
            <section class="step-card wizard-panel">Shipping Address</section>
            <section class="step-card wizard-panel">Payment Method</section>
        </main>
    </div>
</body>
</html>
